version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banking-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://db:5432/banking
      - DB_USERNAME=${DB_USERNAME:-banking_user}
      - DB_PASSWORD=${DB_PASSWORD:-banking_pass}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-minimum-256-bits-required}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - banking-network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: banking-db
    environment:
      - POSTGRES_DB=banking
      - POSTGRES_USER=${DB_USERNAME:-banking_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-banking_pass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-banking_user} -d banking"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  banking-network:
    driver: bridge
