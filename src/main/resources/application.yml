spring:
  application:
    name: banking-financial-api

  # Default profile - use dev if not specified
  profiles:
    active: dev

  # Jackson JSON configuration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    property-naming-strategy: LOWER_CAMEL_CASE

  # JPA configuration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50

  # H2 Console (disabled by default)
  h2:
    console:
      enabled: false

  # Flyway (disabled by default for dev profile)
  flyway:
    enabled: false
    baseline-on-migrate: true

# Server configuration
server:
  port: 8080
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always

# Graceful shutdown timeout
spring.lifecycle.timeout-per-shutdown-phase: 30s

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:change-me-in-production-minimum-256-bits-required}
  access-token-expiration: 900000  # 15 minutes
  refresh-token-expiration: 604800000  # 7 days

# Rate limiting configuration
# Current: In-memory (ConcurrentHashMap) - suitable for single-instance
# For horizontal scaling, configure Redis and use Bucket4j Redis backend
rate-limit:
  backend: in-memory  # Options: in-memory, redis (requires redis-url)
  # redis-url: ${REDIS_URL:redis://localhost:6379}
  general:
    capacity: 100
    refill-tokens: 100
    refill-duration: 60
  auth:
    capacity: 10
    refill-tokens: 10
    refill-duration: 60

# Token blacklist configuration
# Current: In-memory (ConcurrentHashMap) - suitable for single-instance
# For horizontal scaling, configure Redis for shared blacklist
token-blacklist:
  backend: in-memory  # Options: in-memory, redis
  cleanup-interval: 300000  # 5 minutes in milliseconds

# CORS Configuration
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: Authorization,Content-Type,Accept,Origin,X-Trace-Id,X-Requested-With,Access-Control-Request-Method,Access-Control-Request-Headers
  allow-credentials: true

# Logging configuration
logging:
  level:
    root: INFO
    com.banking: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# OpenAPI/Swagger configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
