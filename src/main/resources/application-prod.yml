# Production profile configuration
spring:
  config:
    activate:
      on-profile: prod

  # PostgreSQL Database for production
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/banking}
    username: ${DB_USERNAME:banking_user}
    password: ${DB_PASSWORD:banking_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      max-lifetime: 1800000
      idle-timeout: 600000
      pool-name: BankingHikariPool

  # JPA configuration for prod
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50

  # Enable Flyway in prod
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# Disable H2 console in prod
  h2:
    console:
      enabled: false

# Actuator configuration for prod
management:
  endpoint:
    health:
      show-details: when_authorized

# Logging for prod
logging:
  level:
    root: WARN
    com.banking: INFO
    org.springframework.security: WARN
